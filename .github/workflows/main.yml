name: CI/CD Demo Proyecto Semestral

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen backend ventas
        run: |
          docker build -t ventas-api:demo ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Build imagen backend despachos
        run: |
          docker build -t despachos-api:demo ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Build imagen frontend despacho
        run: |
          docker build -t front-despacho:demo ./front_despacho

      - name: Validar backend desplegado en ECS
        run: |
          curl -f http://98.87.2.126:8080/api/v1/ventas

      - name: Resumen del pipeline
        run: |
          echo "Build de imágenes Docker ejecutado correctamente."
          echo "Backend ventas validado contra ECS/Fargate mediante endpoint público."
          echo "Pipeline usado como demostración CI/CD académica."